name: DevSecOps-Pipeline

on:
    push:
        branches: [main]

jobs:
    security_linting:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Gitleaks Scan
              uses: gitleaks/gitleaks-action@v2

            - name: Bandit Scan
              run: |
                  pip install bandit
                  bandit -r ./app -f txt -o bandit-report.txt || true

            - name: Upload Report
              uses: actions/upload-artifact@v4
              with:
                  name: bandit-report
                  path: bandit-report.txt

    build_and_scan:
        needs: security_linting
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Snyk Scan
              uses: snyk/actions/python@master
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  args: --severity-threshold=high

            - name: Configure AWS
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: us-east-1

            - name: Login ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build Image
              run: |
                  docker build -t ${{ steps.login-ecr.outputs.registry }}/secure-app:${{ github.sha }} .

            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ steps.login-ecr.outputs.registry }}/secure-app:${{ github.sha }}
                  severity: CRITICAL,HIGH
                  exit-code: 1

            - name: Push Image
              run: |
                  docker push ${{ steps.login-ecr.outputs.registry }}/secure-app:${{ github.sha }}

            - name: Sign Image
              run: |
                  cosign sign --yes --key env://COSIGN_PRIVATE_KEY ${{ steps.login-ecr.outputs.registry }}/secure-app:${{ github.sha }}
              env:
                  COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
                  COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
